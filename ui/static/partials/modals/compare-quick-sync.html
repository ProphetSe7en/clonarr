{{define "modals/compare-quick-sync"}}
  <!-- Confirm modal -->
  <!-- Per-card Quick Sync modal — simplified confirm with Sync/Dry Run/Cancel, no dropdowns. -->
  <div class="modal-overlay" x-show="compareQuickSync.show" @click.self="if (!compareQuickSync.running) compareQuickSync = { show: false }" x-cloak>
    <div class="modal" style="max-width:440px" @click.stop>
      <div class="modal-header">
        <div style="font-size:15px;font-weight:600" x-text="compareQuickSync.title"></div>
      </div>
      <div class="modal-body" style="font-size:13px;line-height:1.55">
        <div style="margin-bottom:10px">
          <span x-text="compareQuickSync.summary"></span>
          <template x-if="compareQuickSync.cr && compareQuickSync.inst">
            <div style="margin-top:8px;color:#8b949e;font-size:12px">
              Target: <strong style="color:#c9d1d9" x-text="compareQuickSync.cr?.arrProfileName"></strong>
              on <strong style="color:#c9d1d9" x-text="compareQuickSync.inst?.name"></strong>
              — TRaSH profile: <strong style="color:#c9d1d9" x-text="compareQuickSync.cr?.trashProfileName"></strong>
            </div>
          </template>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" :disabled="compareQuickSync.running"
                @click="compareQuickSync = { show: false }">Cancel</button>
        <template x-if="compareQuickSync.section !== 'extras'">
          <button class="btn btn-blue" :disabled="compareQuickSync.running"
                  @click="compareQuickSyncRun('dryrun')">Dry Run</button>
        </template>
        <button class="btn btn-primary" :disabled="compareQuickSync.running"
                @click="compareQuickSyncRun('sync')">
          <span x-show="compareQuickSync.running" class="spinner"></span>
          <span x-show="!compareQuickSync.running" x-text="compareQuickSync.section === 'extras' ? 'Remove' : 'Sync'"></span>
        </button>
      </div>
    </div>
  </div>

{{end}}
