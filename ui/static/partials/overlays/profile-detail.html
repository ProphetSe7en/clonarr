{{define "overlays/profile-detail"}}
  <!-- ==================== PROFILE DETAIL ==================== -->
  <div class="page" x-show="profileDetail && !['settings','about'].includes(currentSection)" x-cloak>
    <a class="back-link" @click="profileDetail = null; syncPlan = null; syncResult = null; showProfileInfo = false; selectedOptionalCFs = {}; groupExpanded = {}; detailSections = { core: true }; pdResetDetailState(); pdInitOverrides(null)">&larr; Back to Profiles</a>

    <div style="margin-top:16px" x-show="profileDetail">
      <!-- Sync result banner -->
      <template x-if="syncResult">
        <div class="result-banner" :class="syncResult.errors?.length ? 'error' : 'success'">
          <div class="result-title" x-text="syncResult.errors?.length ? 'Sync completed with errors' : 'Sync completed successfully'"></div>
          <div class="result-detail">
            <template x-if="syncResult.profileCreated">
              <span>Profile created: <strong x-text="syncResult.arrProfileName"></strong> — </span>
            </template>
            Created: <span x-text="syncResult.cfsCreated || 0"></span> CFs,
            Updated: <span x-text="syncResult.cfsUpdated || 0"></span> CFs,
            Scores: <span x-text="syncResult.scoresUpdated || 0"></span> updated,
            Settings: <span x-text="(syncResult.settingsDetails || []).length"></span> changed,
            Quality: <span x-text="(syncResult.qualityDetails || []).length"></span> changes
            <template x-if="syncResult.errors?.length">
              <span> — <span x-text="syncResult.errors.length"></span> errors</span>
            </template>
          </div>
          <!-- Change details (quality, settings, CF, score) -->
          <template x-if="[...(syncResult.cfDetails || []), ...(syncResult.scoreDetails || []), ...(syncResult.qualityDetails || []), ...(syncResult.settingsDetails || [])].length > 0">
            <div style="margin-top:6px">
              <a style="font-size:12px;color:#58a6ff;cursor:pointer;user-select:none" @click="syncResultDetailsOpen = !syncResultDetailsOpen"
                 x-text="syncResultDetailsOpen ? '▾ Hide details' : '▸ Show details (' + [...(syncResult.cfDetails || []), ...(syncResult.scoreDetails || []), ...(syncResult.qualityDetails || []), ...(syncResult.settingsDetails || [])].length + ' changes)'"></a>
              <div x-show="syncResultDetailsOpen" style="margin-top:4px;font-size:13px;color:#aaa">
                <template x-for="(d, i) in [...(syncResult.cfDetails || []), ...(syncResult.scoreDetails || []), ...(syncResult.qualityDetails || []), ...(syncResult.settingsDetails || [])]" :key="i">
                  <div style="padding:1px 0" x-text="d"></div>
                </template>
              </div>
            </div>
          </template>
          <template x-if="syncResult.errors?.length">
            <div style="margin-top:8px;font-size:13px">
              <template x-for="(err, i) in syncResult.errors" :key="i">
                <div style="color:#f0883e;padding:2px 0" x-text="err"></div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Dry-run banner -->
      <template x-if="syncPlan">
        <div class="dryrun-bar">
          <div class="text">
            <strong>Dry-run results:</strong>
            <template x-if="syncPlan.createProfile">
              <span>New profile: <strong x-text="syncPlan.newProfileName"></strong> — </span>
            </template>
            <span x-text="syncPlan.summary.cfsToCreate"></span> to create,
            <span x-text="syncPlan.summary.cfsToUpdate"></span> to update,
            <span x-text="syncPlan.summary.cfsUnchanged"></span> unchanged
            <template x-if="syncPlan.summary.scoresToSet > 0">
              <span> — <span x-text="syncPlan.summary.scoresToSet"></span> scores to set</span>
            </template>
            <template x-if="syncPlan.summary.scoresToZero > 0">
              <span style="color:#d29922"> — <span x-text="syncPlan.summary.scoresToZero"></span> extra scores zeroed</span>
            </template>
            <template x-if="(syncPlan.settingsPreview || []).length > 0 || (syncPlan.qualityPreview || []).length > 0 || (syncPlan.cfActions || []).some(a => a.action !== 'unchanged') || (syncPlan.scoreActions || []).some(a => a.action !== 'unchanged')">
              <div style="margin-top:6px">
                <a style="font-size:12px;color:#58a6ff;cursor:pointer;user-select:none" @click="dryrunDetailsOpen = !dryrunDetailsOpen"
                   x-text="dryrunDetailsOpen ? '▾ Hide details' : '▸ Show details'"></a>
                <div x-show="dryrunDetailsOpen" style="margin-top:4px;font-size:12px;color:#c9d1d9;line-height:1.6">
                  <template x-for="s in (syncPlan.settingsPreview || [])" :key="s">
                    <div><span style="color:#58a6ff">Settings:</span> <span x-text="s"></span></div>
                  </template>
                  <template x-for="q in (syncPlan.qualityPreview || [])" :key="q">
                    <div><span style="color:#d29922">Quality:</span> <span x-text="q"></span></div>
                  </template>
                  <template x-for="a in (syncPlan.cfActions || []).filter(a => a.action === 'create')" :key="'cf-'+a.name">
                    <div><span style="color:#3fb950">Create CF:</span> <span x-text="a.name"></span></div>
                  </template>
                  <template x-for="a in (syncPlan.cfActions || []).filter(a => a.action === 'update')" :key="'cfu-'+a.name">
                    <div><span style="color:#58a6ff">Update CF:</span> <span x-text="a.name"></span></div>
                  </template>
                  <template x-for="a in (syncPlan.scoreActions || []).filter(a => a.action !== 'unchanged')" :key="'sc-'+a.cfName">
                    <div><span style="color:#d29922">Score:</span> <span x-text="a.cfName + ': ' + a.oldScore + ' → ' + a.newScore"></span></div>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <button class="btn btn-primary" @click="applySync()" :disabled="syncing">
            <span x-show="syncing" class="spinner"></span>
            <span x-show="!syncing">Apply to <span x-text="syncPlan?.instanceName || profileDetail?.instance?.name"></span></span>
          </button>
        </div>
      </template>

      <div class="card" :style="profileDetail?.detail?.imported ? 'background:#0d1117' : ''">
        <!-- Header -->
        <div style="padding:16px 20px;border-bottom:1px solid #30363d">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
            <div style="flex:1;min-width:0">
              <div style="font-size:16px;font-weight:600">
                <span x-text="profileDetail?.profile?.name"></span>
                <span class="sqp-badge" x-show="profileDetail?.detail?.scoreCtx && profileDetail?.detail?.scoreCtx !== 'default'" x-text="profileDetail?.detail?.scoreCtx" style="font-size:13px"></span>
              </div>
              <div style="font-size:12px;color:#aaa;margin-top:4px">
                <template x-if="profileDetail?.instance?.name">
                  <span><span x-text="profileDetail.instance.name"></span><template x-if="profileDetail._arrProfileName"><span> → <span style="color:#e1e4e8" x-text="profileDetail._arrProfileName"></span></span></template> — </span>
                </template>
                <span x-text="profileDetail?.detail?.totalCoreCFs || 0"></span> <span x-text="profileDetail?.detail?.imported ? 'Custom Formats' : 'Required CFs'"></span>
                <template x-if="countAllCategoryCFs() > 0">
                  <span> + <span x-text="countAllCategoryCFs()"></span> from groups</span>
                </template>
              </div>
              <template x-if="profileDetail?.detail?.profile?.trash_description">
                <div @click="showProfileInfo = !showProfileInfo" style="margin-top:8px;cursor:pointer;font-size:12px;color:#58a6ff;user-select:none;display:inline-block">
                  <span x-text="showProfileInfo ? '▾' : '▸'"></span> Profile info
                </div>
              </template>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0" x-show="profileDetail?.detail?.imported">
              <button x-show="profileDetail?.detail?.importedRaw && (profileDetail.detail.importedRaw.source === 'custom' || profileDetail.detail.importedRaw.source === 'import' || !profileDetail.detail.importedRaw.source)" class="btn btn-sm" @click="editCustomProfile(profileDetail.detail.importedRaw.appType || profileDetail.instance?.type, profileDetail.detail.importedRaw)">Edit</button>
              <button class="btn btn-sm btn-blue" @click="openExportModal()">Export</button>
              <button class="btn btn-sm btn-primary" @click="openImportedSyncModal()" title="Save settings and sync to existing Arr profile">Save & Sync</button>
              <button class="btn btn-sm" style="border-color:#58a6ff;color:#58a6ff" @click="openImportedSyncModalAsNew()" title="Create a new Arr profile with these settings">Create New</button>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0" x-show="!profileDetail?.detail?.imported">
              <button class="btn btn-sm btn-primary" @click="openSyncModal(profileDetail.instance, profileDetail.profile)" title="Save settings and sync to existing Arr profile">Save & Sync</button>
              <button class="btn btn-sm" style="border-color:#58a6ff;color:#58a6ff" @click="openSyncModalAsNew(profileDetail.instance, profileDetail.profile)" title="Create a new Arr profile with these settings">Create New</button>
            </div>
          </div>
          <!-- Profile info panel (full-width below flex row, so expanding it doesn't push buttons) -->
          <template x-if="profileDetail?.detail?.profile?.trash_description">
            <div x-show="showProfileInfo" x-cloak style="margin-top:10px;padding:12px;background:#0d1117;border:1px solid #21262d;border-radius:6px;font-size:12px;color:#aaa;line-height:1.5">
              <span x-html="sanitizeHTML(profileDetail.detail.profile.trash_description)"></span>
              <template x-if="profileDetail.detail.profile.trash_url">
                <a :href="profileDetail.detail.profile.trash_url" target="_blank" rel="noopener" style="display:block;margin-top:6px;color:#58a6ff;font-size:13px;text-decoration:none">View on TRaSH Guides &rarr;</a>
              </template>
            </div>
          </template>
        </div>

        <!-- Profile settings — unified General + Quality card with per-section overrides -->
        <div x-show="profileDetail?.detail?.profile" style="padding:16px 12px 20px 12px;border-bottom:1px solid #30363d;background:#0d1117">

          <!-- Summary bar: live override count / follow-defaults state -->
          <div style="background:#161b22;border:1px solid #444c56;border-radius:8px;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;box-shadow:0 2px 6px rgba(0,0,0,0.5)"
               :style="pdOverrideSummary().total > 0 ? 'border-color:#d29922' : 'border-color:#3fb95088'">
            <template x-if="pdOverrideSummary().total === 0">
              <span style="font-size:13px;color:#3fb950;font-weight:500">&#10003; All values follow TRaSH defaults</span>
            </template>
            <template x-if="pdOverrideSummary().total > 0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px">
                <span style="color:#d29922;font-weight:600">&#9888; Overrides enabled —</span>
                <template x-if="pdOverrideSummary().general > 0">
                  <span style="color:#d29922;background:#3d2e0a;padding:1px 7px;border-radius:10px" x-text="'General: ' + pdOverrideSummary().general"></span>
                </template>
                <template x-if="pdOverrideSummary().quality > 0">
                  <span style="color:#d29922;background:#3d2e0a;padding:1px 7px;border-radius:10px" x-text="'Quality: ' + pdOverrideSummary().quality"></span>
                </template>
                <template x-if="pdOverrideSummary().cfScores > 0">
                  <span style="color:#d29922;background:#3d2e0a;padding:1px 7px;border-radius:10px" x-text="'CF Scores: ' + pdOverrideSummary().cfScores"></span>
                </template>
                <template x-if="pdOverrideSummary().extraCFs > 0">
                  <span style="color:#d29922;background:#3d2e0a;padding:1px 7px;border-radius:10px" x-text="'Extra CFs: ' + pdOverrideSummary().extraCFs"></span>
                </template>
                <button class="btn" style="font-size:12px;padding:2px 10px;border-color:#d29922;color:#d29922;margin-left:4px"
                        title="Reset every override (General, Quality, CF scores, Extra CFs) back to TRaSH defaults"
                        @click="confirmModal = { show:true, title:'Reset All Overrides', message:'This will reset General, Quality, CF scores, quality items, and Extra CFs back to TRaSH defaults. Continue?', confirmLabel:'Reset All', onConfirm: () => pdResetAllOverrides(), onCancel: () => {} }">Reset all</button>
              </div>
            </template>
          </div>

          <!-- Two clearly separated cards (blue accent = General, purple accent = Quality), matching `.detail-section` visual language used by Required CFs etc. -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

            <!-- GENERAL card -->
            <div class="pd-card pd-card-general" :class="pdGeneralActive ? 'pd-active' : ''">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #21262d">
                <div style="font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;font-weight:600">General</div>
                <div style="display:flex;align-items:center;gap:8px">
                  <template x-if="pdGeneralActive && pdGeneralChangeCount() > 0">
                    <button class="btn" style="font-size:11px;padding:1px 8px;border-color:#d29922;color:#d29922" title="Reset General values to TRaSH defaults (keeps override on)" @click="pdResetGeneral()">&#8634; Reset</button>
                  </template>
                  <label class="toggle toggle-sm" style="flex-shrink:0" title="Override General settings">
                    <input type="checkbox" :checked="pdGeneralActive" @change="pdSetGeneralActive($event.target.checked)">
                    <span class="slider"></span>
                  </label>
                  <span style="font-size:12px;color:#aaa" x-text="pdGeneralActive ? 'Hide Overrides' : 'Override'"></span>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:4px">
                <!-- Language (Radarr only — Sonarr removed language from profiles in v4) -->
                <div class="pd-row" x-show="activeAppType === 'radarr'">
                  <span class="pd-label">Language</span>
                  <template x-if="pdGeneralActive">
                    <select class="pb-input pd-input"
                            :style="pdOverrides.language.value !== (profileDetail?.detail?.profile?.language || 'Original') ? 'border-color:#d29922' : ''"
                            x-effect="populateSelectField($el, (instanceLanguages[profileDetail?.instance?.id] || [{name:'Original'},{name:'Any'}]).map(l => ({value: l.name, name: l.name})), pdOverrides.language.value)"
                            @change="pdOverrides.language.value = $el.value">
                    </select>
                  </template>
                  <template x-if="!pdGeneralActive">
                    <span class="pd-value"
                          :style="pdOverrides.language.value !== (profileDetail?.detail?.profile?.language || 'Original') ? 'color:#d29922' : ''"
                          :title="pdOverrides.language.value !== (profileDetail?.detail?.profile?.language || 'Original') ? 'Overridden — TRaSH default: ' + (profileDetail?.detail?.profile?.language || 'Original') : ''"
                          x-text="pdOverrides.language.value || profileDetail?.detail?.profile?.language || 'Original'"></span>
                  </template>
                </div>
                <!-- Upgrades Allowed -->
                <div class="pd-row">
                  <span class="pd-label">Upgrades Allowed</span>
                  <template x-if="pdGeneralActive">
                    <label class="toggle toggle-sm" @click.stop style="flex-shrink:0">
                      <input type="checkbox" :checked="pdOverrides.upgradeAllowed.value === true || pdOverrides.upgradeAllowed.value === 'true'"
                             @change="pdOverrides.upgradeAllowed.value = $event.target.checked">
                      <span class="slider"></span>
                    </label>
                  </template>
                  <template x-if="!pdGeneralActive">
                    <span class="pd-value"
                          :style="(pdOverrides.upgradeAllowed.value === true || pdOverrides.upgradeAllowed.value === 'true') !== (profileDetail?.detail?.profile?.upgradeAllowed ?? true) ? 'color:#d29922' : ''"
                          :title="(pdOverrides.upgradeAllowed.value === true || pdOverrides.upgradeAllowed.value === 'true') !== (profileDetail?.detail?.profile?.upgradeAllowed ?? true) ? 'Overridden — TRaSH default: ' + ((profileDetail?.detail?.profile?.upgradeAllowed ?? true) ? 'Yes' : 'No') : ''"
                          x-text="(pdOverrides.upgradeAllowed.value === true || pdOverrides.upgradeAllowed.value === 'true') ? 'Yes' : 'No'"></span>
                  </template>
                </div>
                <!-- Min Score -->
                <div class="pd-row">
                  <span class="pd-label">Min Score</span>
                  <template x-if="pdGeneralActive">
                    <input type="number" class="pb-input pd-input" x-model.number="pdOverrides.minFormatScore.value"
                           :title="pdMaxPossibleScore !== null ? (pdMinScoreInvalid ? 'Above max (' + pdMaxPossibleScore + '). Sonarr/Radarr will reject — Min Score cannot exceed the sum of positive Custom Format scores after this sync.' : 'Max for this profile after sync: ' + pdMaxPossibleScore + ' (sum of every positive Custom Format score that will be in the profile). Sonarr/Radarr rejects values above this.') : ''"
                           :style="pdMinScoreInvalid ? 'border-color:#f85149' : (pdOverrides.minFormatScore.value !== (profileDetail?.detail?.profile?.minFormatScore ?? 0) ? 'border-color:#d29922' : '')">
                  </template>
                  <template x-if="!pdGeneralActive">
                    <span class="pd-value"
                          :style="pdOverrides.minFormatScore.value !== (profileDetail?.detail?.profile?.minFormatScore ?? 0) ? 'color:#d29922' : ''"
                          :title="pdOverrides.minFormatScore.value !== (profileDetail?.detail?.profile?.minFormatScore ?? 0) ? 'Overridden — TRaSH default: ' + (profileDetail?.detail?.profile?.minFormatScore ?? 0) : ''"
                          x-text="pdOverrides.minFormatScore.value ?? profileDetail?.detail?.profile?.minFormatScore ?? 0"></span>
                  </template>
                </div>
                <!-- Min Upgrade Score (auto-coerces to 1 if user enters 0 or negative,
                     matching Sonarr/Radarr's own UI behaviour) -->
                <div class="pd-row">
                  <span class="pd-label">Min Upgrade Score</span>
                  <template x-if="pdGeneralActive">
                    <input type="number" min="1" class="pb-input pd-input" x-model.number="pdOverrides.minUpgradeFormatScore.value"
                           @blur="if ((pdOverrides.minUpgradeFormatScore.value ?? 1) < 1) pdOverrides.minUpgradeFormatScore.value = 1"
                           title="Must be 1 or higher (Sonarr/Radarr's own rule). Values below 1 are auto-corrected to 1 on Save."
                           :style="pdOverrides.minUpgradeFormatScore.value !== (profileDetail?.detail?.profile?.minUpgradeFormatScore ?? 1) ? 'border-color:#d29922' : ''">
                  </template>
                  <template x-if="!pdGeneralActive">
                    <span class="pd-value"
                          :style="pdOverrides.minUpgradeFormatScore.value !== (profileDetail?.detail?.profile?.minUpgradeFormatScore ?? 1) ? 'color:#d29922' : ''"
                          :title="pdOverrides.minUpgradeFormatScore.value !== (profileDetail?.detail?.profile?.minUpgradeFormatScore ?? 1) ? 'Overridden — TRaSH default: ' + (profileDetail?.detail?.profile?.minUpgradeFormatScore ?? 1) : ''"
                          x-text="pdOverrides.minUpgradeFormatScore.value ?? profileDetail?.detail?.profile?.minUpgradeFormatScore ?? 1"></span>
                  </template>
                </div>
                <!-- Cutoff Score -->
                <div class="pd-row">
                  <span class="pd-label">Cutoff Score</span>
                  <template x-if="pdGeneralActive">
                    <input type="number" class="pb-input pd-input" x-model.number="pdOverrides.cutoffFormatScore.value"
                           :style="pdOverrides.cutoffFormatScore.value !== (profileDetail?.detail?.profile?.cutoffFormatScore || profileDetail?.detail?.profile?.cutoffScore || 10000) ? 'border-color:#d29922' : ''">
                  </template>
                  <template x-if="!pdGeneralActive">
                    <span class="pd-value"
                          :style="pdOverrides.cutoffFormatScore.value !== (profileDetail?.detail?.profile?.cutoffFormatScore || profileDetail?.detail?.profile?.cutoffScore || 10000) ? 'color:#d29922' : ''"
                          :title="pdOverrides.cutoffFormatScore.value !== (profileDetail?.detail?.profile?.cutoffFormatScore || profileDetail?.detail?.profile?.cutoffScore || 10000) ? 'Overridden — TRaSH default: ' + (profileDetail?.detail?.profile?.cutoffFormatScore || profileDetail?.detail?.profile?.cutoffScore || 10000) : ''"
                          x-text="pdOverrides.cutoffFormatScore.value ?? profileDetail?.detail?.profile?.cutoffFormatScore ?? profileDetail?.detail?.profile?.cutoffScore ?? 10000"></span>
                  </template>
                </div>
                <!-- Score Set (always read-only) -->
                <div class="pd-row">
                  <span class="pd-label">Score Set</span>
                  <span class="pd-value" style="color:#8b949e" x-text="profileDetail?.detail?.profile?.scoreSet || profileDetail?.detail?.scoreCtx || 'default'"></span>
                </div>
              </div>
            </div>

            <!-- QUALITY card. Spans full grid width when the items editor is open so the
                 drag-drop editor has room (avoids column-count overflow in half-width). -->
            <div class="pd-card pd-card-quality"
                 :class="pdQualityActive ? 'pd-active' : ''"
                 :style="qualityOverrideActive && profileDetail?.detail?.profile?.items?.length > 0 ? 'grid-column:1/-1' : ''">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #21262d">
                <div style="font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Quality</div>
                <div style="display:flex;align-items:center;gap:8px">
                  <template x-if="pdQualityActive && pdQualityChangeCount() > 0">
                    <button class="btn" style="font-size:11px;padding:1px 8px;border-color:#d29922;color:#d29922" title="Reset Quality cutoff to TRaSH default (keeps override on)" @click="pdResetQuality()">&#8634; Reset</button>
                  </template>
                  <label class="toggle toggle-sm" style="flex-shrink:0" title="Override Quality cutoff">
                    <input type="checkbox" :checked="pdQualityActive" @change="pdSetQualityActive($event.target.checked)">
                    <span class="slider"></span>
                  </label>
                  <span style="font-size:12px;color:#aaa" x-text="pdQualityActive ? 'Hide Overrides' : 'Override'"></span>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:4px">
                <!-- Cutoff -->
                <div class="pd-row">
                  <span class="pd-label">Cutoff</span>
                  <template x-if="pdQualityActive">
                    <select class="pb-input pd-input"
                            :style="pdOverrides.cutoffQuality !== (profileDetail?.detail?.profile?.cutoff || '') && pdOverrides.cutoffQuality !== '' ? 'border-color:#d29922' : ''"
                            x-effect="populateCutoffSelect($el, qualityStructure, profileDetail?.detail?.profile, pdOverrides.cutoffQuality, qualityOverrides)"
                            @change="pdOverrides.cutoffQuality = $el.value">
                    </select>
                  </template>
                  <template x-if="!pdQualityActive">
                    <span class="pd-value"
                          :style="pdOverrides.cutoffQuality && pdOverrides.cutoffQuality !== (profileDetail?.detail?.profile?.cutoff || '') ? 'color:#d29922' : ''"
                          :title="pdOverrides.cutoffQuality && pdOverrides.cutoffQuality !== (profileDetail?.detail?.profile?.cutoff || '') ? 'Overridden — TRaSH default: ' + (profileDetail?.detail?.profile?.cutoff || '—') : ''"
                          x-text="pdOverrides.cutoffQuality || profileDetail?.detail?.profile?.cutoff || '—'"></span>
                  </template>
                </div>
              </div>
              <!-- Edit Quality Items button: enabled only when Quality override is active -->
              <div style="margin-top:14px;padding-top:10px;border-top:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;gap:10px">
                <div style="display:flex;align-items:center;gap:8px;min-width:0">
                  <span style="font-size:13px;color:#aaa">Quality Items</span>
                  <template x-if="qualityStructure.length > 0 || Object.keys(qualityOverrides).length > 0">
                    <span style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 6px;border-radius:8px" x-text="pdQualityItemsChangeCount() + ' edited'"></span>
                  </template>
                </div>
                <div style="display:flex;gap:6px">
                  <template x-if="qualityStructure.length > 0 || Object.keys(qualityOverrides).length > 0">
                    <button class="btn" style="font-size:11px;padding:1px 8px;border-color:#d29922;color:#d29922" title="Reset quality items to TRaSH defaults" @click="qsResetAll()">&#8634; Reset</button>
                  </template>
                  <button class="btn" style="font-size:12px;padding:2px 10px"
                          :disabled="!pdQualityActive"
                          :style="pdQualityActive ? 'border-color:#d29922;color:#d29922' : 'opacity:0.4;cursor:not-allowed'"
                          title="Edit resolution toggles, grouping, and ordering. Enable Quality override first."
                          @click="if (pdQualityActive) { qualityOverrideActive = !qualityOverrideActive; if (!qualityOverrideActive) qsCloseSharedState(); }">
                    <span x-text="qualityOverrideActive ? '✓ Done' : 'Edit Quality Items'"></span>
                  </button>
                </div>
              </div>

              <!-- Inline Quality Items editor (expands inside the card when Edit Quality Items is toggled).
                   Mirrors Builder's inline-expansion UX. Quality card spans full grid width while this is open. -->
              <template x-if="qualityOverrideActive && profileDetail?.detail?.profile?.items?.length > 0">
                <div x-cloak style="margin-top:12px;border-top:1px solid #21262d;padding-top:12px"
                     :class="qualityStructureEditMode ? 'qs-edit-on' : ''">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
                    <div style="font-size:12px;color:#aaa" x-show="!qualityStructureEditMode">Toggle resolutions on/off</div>
                    <div style="font-size:12px;color:#aaa" x-show="qualityStructureEditMode">Drag rows to reorder · drop on a row to merge · click group name to rename</div>
                    <div style="flex:1"></div>
                    <button class="btn"
                            style="font-size:12px;padding:2px 10px"
                            :style="qualityStructureEditMode ? 'background:#238636;border-color:#238636;color:#fff' : ''"
                            @click="qsToggleEditMode()">
                      <span x-text="qualityStructureEditMode ? '✓ Done Editing Groups' : 'Edit Groups'"></span>
                    </button>
                    <button class="btn"
                            style="font-size:12px;padding:2px 10px;border-color:#d29922;color:#d29922"
                            title="Reset all quality overrides to TRaSH default. Discards toggles, groups, ordering, and renames."
                            @click="qsResetAll()">Reset to TRaSH</button>
                  </div>

                  <!-- LEGACY view: structure not yet initialized → flat toggle list -->
                  <template x-if="qualityStructure.length === 0">
                    <div :style="'column-count:' + (profileDetail.detail.profile.items.length > 12 ? 3 : profileDetail.detail.profile.items.length > 6 ? 2 : 1) + ';column-gap:16px'">
                      <template x-for="item in profileDetail.detail.profile.items" :key="item.name">
                        <div style="break-inside:avoid;display:flex;align-items:center;gap:6px;padding:4px 0">
                          <label class="toggle toggle-sm" style="flex-shrink:0">
                            <input type="checkbox"
                                   :checked="qualityOverrides[item.name] !== undefined ? qualityOverrides[item.name] : item.allowed"
                                   @change="if ($event.target.checked === item.allowed) { const {[item.name]: _, ...rest} = qualityOverrides; qualityOverrides = rest; } else { qualityOverrides = {...qualityOverrides, [item.name]: $event.target.checked}; }">
                            <span class="slider"></span>
                          </label>
                          <span style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                                :style="(qualityOverrides[item.name] !== undefined ? qualityOverrides[item.name] : item.allowed) ? 'color:#e1e4e8' : 'color:#aaa'"
                                x-text="item.name"></span>
                          <span x-show="qualityOverrides[item.name] !== undefined" style="font-size:10px;color:#d29922;flex-shrink:0">●</span>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- STRUCTURE-DRIVEN view -->
                  <template x-if="qualityStructure.length > 0">
                    <div :style="'column-count:' + (qualityStructure.length > 12 ? 3 : qualityStructure.length > 6 ? 2 : 1) + ';column-gap:16px'">
                      <template x-for="(item, idx) in qualityStructure" :key="item._id">
                        <div style="break-inside:avoid">
                          <template x-if="idx === 0 && qualityStructureEditMode">
                            <div class="qs-drop-gap"
                                 :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropGap === 0 }"
                                 @dragover.prevent="qualityStructureDrag.dropGap = 0"
                                 @dragleave="qualityStructureDrag.dropGap = null"
                                 @drop.prevent="qsHandleDropOnGap(0)"></div>
                          </template>
                          <div class="qs-row"
                               :class="{
                                 'is-group': item.items && qualityStructureEditMode,
                                 'is-dragging': qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx,
                                 'dnd-merge-hover': qualityStructureDrag.dropMerge === idx
                               }"
                               :draggable="qualityStructureEditMode"
                               @dragstart="if (qualityStructureEditMode) { qualityStructureDrag.kind = 'top'; qualityStructureDrag.src = idx; }"
                               @dragover.prevent="if (qualityStructureEditMode && qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx)) qualityStructureDrag.dropMerge = idx"
                               @dragleave="if (qualityStructureDrag.dropMerge === idx) qualityStructureDrag.dropMerge = null"
                               @drop.prevent="qsHandleDropOnRow(idx)"
                               @dragend="qsResetDrag()">
                            <span class="qs-handle" x-show="qualityStructureEditMode" title="Drag to reorder · drop on another row to merge">⋮⋮</span>
                            <template x-if="qualityStructureEditMode">
                              <template x-if="item.items">
                                <span class="qs-chevron"
                                      :class="{ open: qualityStructureExpanded[item._id] }"
                                      @click="qualityStructureExpanded[item._id] = !qualityStructureExpanded[item._id]">&#9654;</span>
                              </template>
                            </template>
                            <template x-if="qualityStructureEditMode && !item.items">
                              <span style="width:10px;display:inline-block"></span>
                            </template>
                            <label class="toggle toggle-sm" style="flex-shrink:0">
                              <!-- @change reassigns qualityStructure by spread so Alpine's
                                   x-effect on the cutoff <select> re-runs. Plain x-model mutates
                                   item.allowed in-place; Alpine's dependency tracking through
                                   function-argument arrays misses the nested write and the cutoff
                                   dropdown's populateCutoffSelect stays stale until a top-level
                                   reassignment (e.g. Edit Groups → Done) forces a refresh. -->
                              <input type="checkbox"
                                     :checked="item.allowed"
                                     @change="item.allowed = $event.target.checked; qualityStructure = qualityStructure.slice()">
                              <span class="slider"></span>
                            </label>
                            <template x-if="qualityStructureRenaming !== item._id">
                              <span class="qs-name"
                                    :class="(qualityStructureEditMode && item.items) ? 'editable' : ''"
                                    :style="item.allowed ? 'color:#e1e4e8' : 'color:#aaa'"
                                    @click="if (qualityStructureEditMode && item.items) qsStartRename(item)"
                                    x-text="item.name"></span>
                            </template>
                            <template x-if="qualityStructureRenaming === item._id">
                              <input class="qs-rename-input"
                                     x-model="item.name"
                                     @blur="qualityStructureRenaming = null"
                                     @keyup.enter="qualityStructureRenaming = null"
                                     @keyup.escape="qualityStructureRenaming = null"
                                     x-init="$nextTick(() => $el.focus())">
                            </template>
                            <span x-show="item.items" class="qs-badge" x-text="item.items?.length"></span>
                            <span x-show="qsIsOverridden(item)" style="font-size:10px;color:#d29922;flex-shrink:0" title="Differs from TRaSH default">●</span>
                            <button x-show="qualityStructureEditMode && item.items" class="qs-tiny-x"
                                    style="font-size:11px;padding:0 6px"
                                    @click="qsDeleteGroup(idx)" title="Delete group (members become individual singles)">× delete</button>
                          </div>
                          <div class="qs-group-members"
                               x-show="item.items && qualityStructureEditMode && qualityStructureExpanded[item._id]"
                               x-cloak
                               :class="{ 'dnd-merge-hover': qualityStructureDrag.dropMerge === idx && qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx) }"
                               @dragover.prevent="if (qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx)) qualityStructureDrag.dropMerge = idx"
                               @dragleave="if (qualityStructureDrag.dropMerge === idx) qualityStructureDrag.dropMerge = null"
                               @drop.prevent.stop="qsHandleDropOnRow(idx)">
                            <template x-for="(m, mIdx) in item.items" :key="'qsm-'+item._id+'-'+m+'-'+mIdx">
                              <div class="qs-member"
                                   :class="{ 'is-dragging': qualityStructureDrag.kind === 'member' && qualityStructureDrag.srcGroup === idx && qualityStructureDrag.srcMember === mIdx }">
                                <span class="qs-pill"
                                      draggable="true"
                                      @dragstart.stop="qualityStructureDrag.kind = 'member'; qualityStructureDrag.srcGroup = idx; qualityStructureDrag.srcMember = mIdx"
                                      @dragend="qsResetDrag()"
                                      x-text="m"></span>
                                <div style="flex:1"></div>
                                <button class="qs-tiny-x" @click="qsUngroupMember(idx, mIdx)" title="Remove from group (back to single)">×</button>
                              </div>
                            </template>
                            <div class="qs-empty-group" x-show="item.items?.length === 0">empty group — drag a member here or click × delete</div>
                          </div>
                          <template x-if="qualityStructureEditMode">
                            <div class="qs-drop-gap"
                                 :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropGap === idx + 1 }"
                                 @dragover.prevent="qualityStructureDrag.dropGap = idx + 1"
                                 @dragleave="qualityStructureDrag.dropGap = null"
                                 @drop.prevent="qsHandleDropOnGap(idx + 1)"></div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <!-- Sub-toggles for CF scores / Extra CFs -->
          <div style="margin-top:18px;background:#161b22;border:1px solid #444c56;border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;box-shadow:0 2px 6px rgba(0,0,0,0.5)">
            <div style="display:flex;align-items:center;gap:8px">
              <label class="toggle toggle-sm" title="Show/edit CF score overrides" style="flex-shrink:0">
                <input type="checkbox" x-model="cfScoreOverrideActive">
                <span class="slider"></span>
              </label>
              <span style="font-size:13px;color:#e1e4e8" x-text="cfScoreOverrideActive ? 'Hide CF Scores' : 'Override CF Scores'"></span>
              <template x-if="Object.keys(cfScoreOverrides).length > 0">
                <span style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 6px;border-radius:8px"
                      x-text="Object.keys(cfScoreOverrides).length + ' edited'"></span>
              </template>
              <template x-if="Object.keys(cfScoreOverrides).length > 0">
                <button class="btn" style="font-size:11px;padding:1px 8px;border-color:#d29922;color:#d29922" title="Reset all CF score overrides" @click="cfScoreOverrides = {}">&#8634; Reset</button>
              </template>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <label class="toggle toggle-sm" title="Add extra CFs not in the TRaSH profile" style="flex-shrink:0">
                <input type="checkbox" x-model="extraCFsActive" @change="if ($event.target.checked) loadExtraCFList()">
                <span class="slider"></span>
              </label>
              <span style="font-size:13px;color:#e1e4e8" x-text="extraCFsActive ? 'Hide Extra CFs' : 'Add Extra CFs'"></span>
              <template x-if="Object.keys(extraCFs).length > 0">
                <span style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 6px;border-radius:8px" x-text="Object.keys(extraCFs).length + ' added'"></span>
              </template>
              <template x-if="Object.keys(extraCFs).length > 0">
                <button class="btn" style="font-size:11px;padding:1px 8px;border-color:#d29922;color:#d29922" title="Remove all extra CFs" @click="extraCFs = {}">&#8634; Reset</button>
              </template>
            </div>
          </div>

          <!-- Score Override Summary — shown when toggle is active and overrides exist -->
          <!-- Render-time filter: only show entries whose score differs from TRaSH default.
               Defense-in-depth: if any code path populates cfScoreOverrides with default-equal
               entries (legacy bug, compare-view leak, etc.), they won't appear here. -->
          <template x-if="cfScoreOverrideActive && Object.keys(cfScoreOverrides).filter(tid => { const d = resolveCFDefaultScore(tid); return d === '?' || cfScoreOverrides[tid] !== d; }).length > 0">
            <div style="margin-top:8px;background:#161b22;border:1px solid #d29922;border-radius:6px;padding:10px 14px">
              <div style="font-size:12px;font-weight:600;color:#d29922;margin-bottom:8px">Overridden Scores</div>
              <div :style="'column-count:' + (Object.keys(cfScoreOverrides).filter(tid => { const d = resolveCFDefaultScore(tid); return d === '?' || cfScoreOverrides[tid] !== d; }).length > 8 ? 2 : 1) + ';column-gap:24px'">
                <template x-for="tid in Object.keys(cfScoreOverrides).filter(tid => { const d = resolveCFDefaultScore(tid); return d === '?' || cfScoreOverrides[tid] !== d; }).sort((a,b) => (resolveCFName(a)).localeCompare(resolveCFName(b)))" :key="'so-'+tid">
                  <div style="break-inside:avoid;display:flex;align-items:center;padding:3px 0;font-size:12px;gap:4px">
                    <span style="color:#e1e4e8;width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="resolveCFName(tid)"></span>
                    <span style="color:#aaa;width:55px;flex-shrink:0;text-align:right;font-family:monospace" x-text="resolveCFDefaultScore(tid)"></span>
                    <span style="color:#aaa;flex-shrink:0;margin:0 2px">→</span>
                    <input type="number" class="pb-score-input overridden" style="width:65px;flex-shrink:0"
                           :value="cfScoreOverrides[tid]"
                           @change="const v = parseInt($event.target.value) || 0; const def = resolveCFDefaultScore(tid); if (v === def) { const {[tid]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest; } else { cfScoreOverrides = {...cfScoreOverrides, [tid]: v}; }">
                    <span @click="const {[tid]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest"
                          style="color:#d29922;font-size:12px;cursor:pointer;flex-shrink:0;margin-left:2px" title="Reset to TRaSH default">&#8634;</span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Extra CFs -->
        <template x-if="extraCFsActive && extraCFAllCFs.length > 0">
          <div style="margin:12px;padding:10px 14px;background:#161b22;border:1px solid #d29922;border-radius:6px">
            <div style="display:flex;align-items:center;margin-bottom:6px;gap:8px;flex-wrap:wrap">
              <span @click="toggleExtraCFsCollapsed()" style="cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px">
                <span class="detail-section-chevron" :class="{ open: !extraCFsCollapsed }">&#9654;</span>
                <span style="font-size:12px;font-weight:600;color:#d29922">Extra Custom Formats</span>
                <template x-if="Object.keys(extraCFs).length > 0">
                  <span style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 6px;border-radius:8px;margin-left:4px" x-text="Object.keys(extraCFs).length + ' added'"></span>
                </template>
              </span>
              <div style="font-size:13px;color:#f85149;font-weight:600">⚠ Non-standard for this profile — use at your own risk</div>
              <input x-show="!extraCFsCollapsed" type="text" class="input" x-model="extraCFSearch" placeholder="Search..." style="font-size:13px;margin-left:auto;width:160px;padding:2px 8px">
            </div>
            <div x-show="!extraCFsCollapsed">
            <!-- Selected extras -->
            <template x-if="Object.keys(extraCFs).length > 0">
              <div style="margin-bottom:8px;padding:6px 8px;background:#0d1117;border-radius:4px">
                <div style="font-size:12px;color:#d29922;margin-bottom:4px;font-weight:600">Added (<span x-text="Object.keys(extraCFs).length"></span>)</div>
                <div :style="'column-count:' + (Object.keys(extraCFs).length > 8 ? 2 : 1) + ';column-gap:24px'">
                <template x-for="tid in Object.keys(extraCFs).sort((a,b) => ((extraCFAllCFs.find(c => c.trashId === a)?.name || a).localeCompare(extraCFAllCFs.find(c => c.trashId === b)?.name || b)))" :key="'xs-'+tid">
                  <div style="break-inside:avoid;display:flex;align-items:center;padding:3px 0;gap:4px">
                    <label class="toggle toggle-sm" style="flex-shrink:0">
                      <input type="checkbox" :checked="extraCFs[tid] !== undefined" @change="const {[tid]: _, ...rest} = extraCFs; extraCFs = rest">
                      <span class="slider"></span>
                    </label>
                    <span style="font-size:13px;color:#d29922;width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="extraCFAllCFs.find(c => c.trashId === tid)?.name || resolveExtraCFName(tid)"></span>
                    <input type="number" class="pb-score-input overridden" :value="extraCFs[tid]" @change="extraCFs = {...extraCFs, [tid]: parseInt($event.target.value)||0}" style="width:65px;flex-shrink:0">
                  </div>
                </template>
                </div>
              </div>
            </template>
            <!-- Available CFs by group -->
            <template x-for="group in extraCFGroups" :key="'xg-'+group.name">
              <div x-show="group.cfs.some(cf => !_extraInProfile(cf.trashId) && extraCFs[cf.trashId] === undefined && (!extraCFSearch || cf.name.toLowerCase().includes(extraCFSearch.toLowerCase())))" style="margin-bottom:4px">
                <div style="padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:4px" @click="detailSections['extra_'+group.name] = !detailSections['extra_'+group.name]">
                  <span class="detail-section-chevron" :class="{ open: detailSections['extra_'+group.name] }">&#9654;</span>
                  <span style="font-size:13px;font-weight:500;color:#aaa" x-text="group.name"></span>
                  <span style="font-size:12px;color:#aaa" x-text="group.cfs.filter(cf => !_extraInProfile(cf.trashId) && extraCFs[cf.trashId] === undefined && (!extraCFSearch || cf.name.toLowerCase().includes(extraCFSearch.toLowerCase()))).length"></span>
                </div>
                <div x-show="detailSections['extra_'+group.name]"
                     :style="'column-count:' + (group.cfs.length > 30 ? 3 : group.cfs.length > 12 ? 2 : 1) + ';column-gap:24px;padding-left:8px'">
                  <template x-for="cf in group.cfs" :key="'xa-'+cf.trashId">
                    <div x-show="!_extraInProfile(cf.trashId) && extraCFs[cf.trashId] === undefined && (!extraCFSearch || cf.name.toLowerCase().includes(extraCFSearch.toLowerCase()))" style="break-inside:avoid;padding:3px 0;opacity:0.6;line-height:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                      <label class="toggle toggle-sm" style="vertical-align:middle;margin-right:6px">
                        <input type="checkbox" :checked="extraCFs[cf.trashId] !== undefined" @change="const scoreSet = profileDetail?.detail?.profile?.trashScoreSet || 'default'; extraCFs = {...extraCFs, [cf.trashId]: cf.trashScores?.[scoreSet] ?? cf.trashScores?.default ?? 0}">
                        <span class="slider"></span>
                      </label>
                      <span style="font-size:13px;vertical-align:middle" :title="cf.name" x-text="cf.name"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div x-show="extraCFAvailable().length === 0" style="font-size:13px;color:#aaa;padding:4px 0">No matching CFs</div>
            </div>
          </div>
        </template>

        <!-- Imported profile: Required CFs (locked) -->
        <template x-if="profileDetail?.detail?.imported && profileDetail?.detail?.importedRequiredCategories?.length > 0">
          <div>
            <div class="detail-section cat-required-core" style="margin-bottom:8px">
              <div class="detail-section-header" @click="toggleDetailSection('importedReq')">
                <span class="detail-section-chevron" :class="{ open: detailSections.importedReq }">&#9654;</span>
                <div style="font-size:13px;font-weight:600">Required Custom Formats</div>
                <div style="font-size:13px;color:#aaa;margin-right:auto" x-text="profileDetail.detail.importedRequiredCategories.reduce((n,c) => n + c.cfs.length, 0) + ' CFs'"></div>
              </div>
              <div class="section-desc" x-show="detailSections.importedReq">
                Required for this profile. Always included when syncing.
              </div>
              <div x-show="detailSections.importedReq">
                <template x-for="cat in profileDetail.detail.importedRequiredCategories" :key="'req-'+cat.category">
                  <div class="detail-section" :class="getCategoryClass(cat.category)" style="margin-bottom:2px">
                    <div class="detail-section-header" @click="toggleGroupExpanded('req', cat.category)">
                      <span class="detail-section-chevron" :class="{ open: groupExpanded['req/' + cat.category] }">&#9654;</span>
                      <div style="font-size:13px;font-weight:600" x-text="cat.category"></div>
                      <div style="font-size:13px;color:#aaa;margin-right:auto" x-text="cat.cfs.length + '/' + cat.cfs.length"></div>
                    </div>
                    <div x-show="groupExpanded['req/' + cat.category]">
                      <template x-for="cf in cat.cfs" :key="cf.trashId">
                        <div class="cf-row">
                          <div class="cf-name" x-text="cf.name"></div>
                          <template x-if="cfScoreOverrideActive">
                            <div style="flex-shrink:0">
                              <input type="number" class="pb-score-input" :class="cfScoreOverrides[cf.trashId] !== undefined ? 'overridden' : ''"
                                     :value="cfScoreOverrides[cf.trashId] ?? cf.score ?? 0"
                                     @change="const v = parseInt($event.target.value) || 0; if (v === (cf.score ?? 0)) { const {[cf.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest; } else { cfScoreOverrides = {...cfScoreOverrides, [cf.trashId]: v}; }"
                                     style="width:65px">
                              <span x-show="cfScoreOverrides[cf.trashId] !== undefined" @click="const {[cf.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest"
                                    style="color:#d29922;font-size:12px;cursor:pointer;margin-left:2px;vertical-align:middle" title="Reset to TRaSH default">&#8634;</span>
                            </div>
                          </template>
                          <template x-if="!cfScoreOverrideActive">
                            <div class="cf-score" :class="(() => { const s = cfScoreOverrides[cf.trashId] ?? cf.score; return s > 0 ? 'positive' : s < 0 ? 'negative' : 'zero'; })()"
                                 :style="cfScoreOverrides[cf.trashId] !== undefined ? 'color:#d29922' : ''">
                              <span x-text="(() => { const s = cfScoreOverrides[cf.trashId] ?? cf.score; return (s > 0 ? '+' : '') + s; })()"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- Imported profile: Golden Rule (pick one — required but with choice) -->
        <template x-if="profileDetail?.detail?.imported && profileDetail?.detail?.importedGoldenRule?.length > 0">
          <div class="detail-section cat-golden-rule" style="margin-bottom:8px">
            <div class="detail-section-header" @click="toggleDetailSection('goldenRule')">
              <span class="detail-section-chevron" :class="{ open: detailSections.goldenRule }">&#9654;</span>
              <div style="font-size:13px;font-weight:600">Golden Rule</div>
              <div style="font-size:13px;color:#aaa;margin-right:auto">pick one</div>
            </div>
            <div x-show="detailSections.goldenRule">
              <div style="padding:6px 16px;font-size:13px;color:#d29922">Please ensure you only score or enable one of them in your Quality Profile!</div>
              <template x-for="cf in profileDetail.detail.importedGoldenRule" :key="cf.trashId">
                <div class="cf-row">
                  <label class="toggle toggle-sm">
                    <input type="checkbox" :checked="selectedOptionalCFs[cf.trashId]"
                           @change="if($event.target.checked) { profileDetail.detail.importedGoldenRule.forEach(c => { if(c.trashId !== cf.trashId) selectedOptionalCFs[c.trashId] = false }); } selectedOptionalCFs[cf.trashId] = $event.target.checked; selectedOptionalCFs = {...selectedOptionalCFs}">
                    <span class="slider"></span>
                  </label>
                  <div class="cf-name" x-text="cf.name"></div>
                  <div class="cf-score" :class="cf.score > 0 ? 'positive' : cf.score < 0 ? 'negative' : 'zero'">
                    <span x-text="(cf.score > 0 ? '+' : '') + cf.score"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Imported profile: Optional CFs (toggleable) — matches TRaSH profile styling -->
        <template x-if="profileDetail?.detail?.imported && profileDetail?.detail?.importedCategories?.length > 0">
          <div>
            <template x-for="cat in profileDetail.detail.importedCategories" :key="cat.category">
              <div class="detail-section" :class="getCategoryClass(cat.category)" style="margin-bottom:8px">
                <div class="detail-section-header" @click="toggleDetailSection(cat.category)">
                  <span class="detail-section-chevron" :class="{ open: detailSections[cat.category] }">&#9654;</span>
                  <div style="font-size:13px;font-weight:600" x-text="cat.category"></div>
                  <div style="font-size:13px;color:#aaa;margin-right:auto" x-text="cat.cfs.filter(cf => selectedOptionalCFs[cf.trashId]).length + '/' + cat.cfs.length"></div>
                  <label class="toggle toggle-sm" @click.stop>
                    <input type="checkbox"
                           :checked="cat.cfs.every(cf => selectedOptionalCFs[cf.trashId])"
                           @change="cat.cfs.forEach(cf => { selectedOptionalCFs[cf.trashId] = $event.target.checked }); selectedOptionalCFs = {...selectedOptionalCFs}">
                    <span class="slider"></span>
                  </label>
                </div>
                <div x-show="detailSections[cat.category]">
                  <template x-for="cf in cat.cfs" :key="cf.trashId">
                    <div class="cf-row">
                      <label class="toggle toggle-sm">
                        <input type="checkbox" :checked="selectedOptionalCFs[cf.trashId]"
                               @change="selectedOptionalCFs[cf.trashId] = $event.target.checked; selectedOptionalCFs = {...selectedOptionalCFs}">
                        <span class="slider"></span>
                      </label>
                      <div class="cf-name" x-text="cf.name"></div>
                      <div class="cf-score" :class="cf.score > 0 ? 'positive' : cf.score < 0 ? 'negative' : 'zero'">
                        <span x-text="(cf.score > 0 ? '+' : '') + cf.score"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Quality items -->
            <template x-if="profileDetail?.detail?.profile?.items?.length > 0">
              <div class="detail-section">
                <div class="detail-section-header" @click="toggleGroupExpanded('imported', 'qualities')">
                  <div class="detail-section-label">Quality Settings</div>
                  <span class="detail-section-chevron" :class="{ open: groupExpanded['imported/qualities'] }">&#9654;</span>
                </div>
                <div x-show="groupExpanded['imported/qualities']" style="padding:12px 16px;font-size:12px;color:#c9d1d9">
                  <template x-for="q in profileDetail.detail.profile.items" :key="q.name">
                    <div style="padding:4px 0;display:flex;gap:8px;align-items:center">
                      <span style="font-weight:500" x-text="q.name"></span>
                      <template x-if="q.items?.length > 0">
                        <span style="color:#aaa;font-size:13px" x-text="'(' + q.items.join(', ') + ')'"></span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Comparison dropdown -->

        <!-- TRaSH group-based sync view -->
        <template x-if="profileDetail?.detail?.trashGroups">
          <div style="background:#0d1117;padding:8px 12px">
            <!-- Profile section: formatItems not in any group -->
            <template x-if="(profileDetail.detail.formatItemNames || []).length > 0">
              <div class="detail-section cat-required-core">
                <div class="detail-section-header" @click="toggleDetailSection('core')">
                  <span class="detail-section-chevron" :class="{ open: detailSections.core }">&#9654;</span>
                  <div style="font-size:13px;font-weight:600">Required CFs</div>
                  <div style="font-size:13px;color:#aaa;margin-right:auto" x-text="profileDetail.detail.formatItemNames.length + ' custom formats'"></div>
                </div>
                <div class="section-desc" x-show="detailSections.core">
                  Required for this profile. Always included when syncing.
                </div>
                <div x-show="detailSections.core" style="padding:14px 20px"
                     :style="'column-count:' + (profileDetail.detail.formatItemNames.length > 20 ? 3 : profileDetail.detail.formatItemNames.length > 10 ? 2 : 1) + ';column-gap:24px'">
                  <template x-for="fi in profileDetail.detail.formatItemNames" :key="fi.trashId">
                    <div class="cf-row" style="padding:2px 0;break-inside:avoid">
                      <div class="cf-name" style="font-size:12px;color:#aaa" x-text="fi.name"></div>
                      <template x-if="cfScoreOverrideActive">
                        <div style="flex-shrink:0">
                          <input type="number" class="pb-score-input" :class="cfScoreOverrides[fi.trashId] !== undefined ? 'overridden' : ''"
                                 :value="cfScoreOverrides[fi.trashId] ?? fi.score ?? 0"
                                 @change="const v = parseInt($event.target.value) || 0; if (v === (fi.score ?? 0)) { const {[fi.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest; } else { cfScoreOverrides = {...cfScoreOverrides, [fi.trashId]: v}; }"
                                 style="width:65px">
                          <span x-show="cfScoreOverrides[fi.trashId] !== undefined" @click="const {[fi.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest"
                                style="color:#d29922;font-size:12px;cursor:pointer;margin-left:2px;vertical-align:middle" title="Reset to TRaSH default">&#8634;</span>
                        </div>
                      </template>
                      <template x-if="!cfScoreOverrideActive">
                        <div class="cf-score" :class="(() => { const s = cfScoreOverrides[fi.trashId] ?? fi.score ?? 0; return s > 0 ? 'positive' : s < 0 ? 'negative' : 'zero'; })()"
                             :style="cfScoreOverrides[fi.trashId] !== undefined ? 'color:#d29922' : ''"
                             x-text="(() => { const s = cfScoreOverrides[fi.trashId] ?? fi.score; return s != null ? ((s > 0 ? '+' : '') + s) : ''; })()"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Groups section header -->
            <div style="font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;padding:12px 0 6px;font-weight:600">
              Groups
              <span style="text-transform:none;letter-spacing:0;font-weight:400"> — toggle to include/exclude from sync</span>
            </div>

            <!-- Flat list of TRaSH CF groups -->
            <template x-for="group in (profileDetail.detail.trashGroups || [])" :key="group.name">
              <div class="detail-section" :class="getCategoryClass(group.category)" style="margin-bottom:4px">
                <div class="detail-section-header" @click="toggleGroupExpanded('tg', group.name)">
                  <span class="detail-section-chevron" :class="{ open: groupExpanded['tg/' + group.name] }">&#9654;</span>
                  <div style="font-size:13px;font-weight:500" x-text="group.name"></div>
                  <span x-show="group.exclusive" style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 5px;border-radius:3px">pick one</span>
                  <span x-show="group.defaultEnabled" style="font-size:11px;color:#3fb950;background:#0d2f1a;padding:1px 5px;border-radius:3px">default</span>
                  <div style="font-size:13px;color:#aaa;margin-left:8px"
                       x-text="(() => { const on = selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled; if (!on) return '0/' + group.cfs.length; return group.cfs.filter(cf => cf.required || selectedOptionalCFs[cf.trashId]).length + '/' + group.cfs.length; })()"></div>
                  <template x-if="group.cfs.some(cf => cfScoreOverrides[cf.trashId] !== undefined)">
                    <span style="font-size:11px;color:#d29922;background:#3d2e0a;padding:1px 5px;border-radius:3px;margin-right:auto"
                          x-text="group.cfs.filter(cf => cfScoreOverrides[cf.trashId] !== undefined).length + ' override' + (group.cfs.filter(cf => cfScoreOverrides[cf.trashId] !== undefined).length !== 1 ? 's' : '')"></span>
                  </template>
                  <template x-if="!group.cfs.some(cf => cfScoreOverrides[cf.trashId] !== undefined)">
                    <span style="margin-right:auto"></span>
                  </template>
                  <!-- Group toggle — shown for every group, including exclusive pick-one groups
                       (Golden Rule). TRaSH's schema marks those CFs `required: false`, so the
                       group itself is optional; "exclusive" only describes picking at most one
                       INSIDE the group once it's enabled. Hiding the group-toggle conflated the
                       two concepts and made Golden Rule feel more forced than e.g. HDR Formats.
                       On group-enable: only auto-check CFs for non-exclusive groups; exclusive
                       groups leave the pick to the user (x265 HD vs x265 no HDR/DV, etc). On
                       group-disable: clear all CFs in the group either way. -->
                  <label class="toggle toggle-sm" @click.stop>
                    <input type="checkbox"
                           :checked="selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled"
                           @change="pdToggleGroup(group, $event.target.checked)">
                    <span class="slider"></span>
                  </label>
                </div>
                <!-- Expanded: description + CFs -->
                <div x-show="groupExpanded['tg/' + group.name]">
                  <!-- Description -->
                  <div x-show="group.trashDescription" class="group-desc-html"
                       style="padding:8px 16px;font-size:13px;color:#9eaab6;font-style:italic;line-height:1.5;border-bottom:1px solid #21262d"
                       x-html="sanitizeHTML(group.trashDescription)"></div>
                  <!-- "All" toggle for optional groups with 3+ CFs (only when group is active) -->
                  <div x-show="!group.cfs.every(cf => cf.required) && !group.exclusive && group.cfs.length >= 3 && (selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled)"
                       style="display:flex;align-items:center;padding:6px 16px;gap:8px;background:#12161d;border-bottom:1px solid #21262d">
                    <label class="toggle toggle-sm" @click.stop>
                      <input type="checkbox"
                             :checked="group.cfs.filter(cf => !cf.required).every(cf => selectedOptionalCFs[cf.trashId])"
                             @change="group.cfs.forEach(cf => { if (!cf.required) selectedOptionalCFs[cf.trashId] = $event.target.checked }); selectedOptionalCFs = {...selectedOptionalCFs}">
                      <span class="slider"></span>
                    </label>
                    <span style="font-size:12px;color:#58a6ff;font-weight:500">All</span>
                    <span style="font-size:13px;color:#aaa"
                          x-text="group.cfs.filter(cf => !cf.required && selectedOptionalCFs[cf.trashId]).length + ' of ' + group.cfs.filter(cf => !cf.required).length + ' enabled'"></span>
                  </div>
                  <!-- CF list -->
                  <template x-for="cf in group.cfs" :key="cf.trashId">
                    <div class="cf-row" :style="(() => { const grpOn = selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled; if (cf.required) return grpOn ? '' : 'opacity:0.35'; return (grpOn || selectedOptionalCFs[cf.trashId]) ? '' : 'opacity:0.35'; })()">
                      <!-- Required CFs in group: no individual toggle, lock icon -->
                      <template x-if="cf.required">
                        <span style="font-size:13px;color:#aaa;width:28px;text-align:center;flex-shrink:0" title="Included when group is active">🔒</span>
                      </template>
                      <!-- Optional CFs in group: individual toggle -->
                      <template x-if="!cf.required">
                        <label class="toggle toggle-sm">
                          <input type="checkbox" :checked="selectedOptionalCFs[cf.trashId]"
                                 @change="group.exclusive ? toggleExclusiveCF(cf.trashId, group.cfs) : toggleOptionalCF(cf.trashId)">
                          <span class="slider"></span>
                        </label>
                      </template>
                      <div class="cf-name">
                        <span x-text="cf.name"></span>
                        <span class="cf-info" x-show="cf.description" @mouseenter="showCFTooltip($event, cf.description)" @mouseleave="hideCFTooltip()">ⓘ</span>
                        <span class="cf-default-badge" x-show="cf.default">recommended</span>
                      </div>
                      <!-- Score: editable for all CFs when score override active (required needs group active, optional needs CF active) -->
                      <template x-if="cfScoreOverrideActive && (cf.required ? (selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled) : selectedOptionalCFs[cf.trashId])">
                        <div style="flex-shrink:0">
                          <input type="number" class="pb-score-input" :class="cfScoreOverrides[cf.trashId] !== undefined ? 'overridden' : ''"
                                 :value="cfScoreOverrides[cf.trashId] ?? cf.score ?? 0"
                                 @change="const v = parseInt($event.target.value) || 0; if (v === (cf.score ?? 0)) { const {[cf.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest; } else { cfScoreOverrides = {...cfScoreOverrides, [cf.trashId]: v}; }"
                                 style="width:65px">
                          <span x-show="cfScoreOverrides[cf.trashId] !== undefined" @click="const {[cf.trashId]: _, ...rest} = cfScoreOverrides; cfScoreOverrides = rest"
                                style="color:#d29922;font-size:12px;cursor:pointer;margin-left:2px;vertical-align:middle" title="Reset to TRaSH default">&#8634;</span>
                        </div>
                      </template>
                      <template x-if="!(cfScoreOverrideActive && (cf.required ? (selectedOptionalCFs['__grp_' + group.name] !== undefined ? selectedOptionalCFs['__grp_' + group.name] : group.defaultEnabled) : selectedOptionalCFs[cf.trashId]))">
                        <div class="cf-score" :class="(() => { const s = cfScoreOverrides[cf.trashId] ?? cf.score; return s > 0 ? 'positive' : s < 0 ? 'negative' : 'zero'; })()"
                             :style="cfScoreOverrides[cf.trashId] !== undefined ? 'color:#d29922' : ''">
                          <span x-text="(() => { const s = cfScoreOverrides[cf.trashId]; if (s !== undefined) return (s > 0 ? '+' : '') + s; return cf.hasScore ? ((cf.score > 0 ? '+' : '') + cf.score) : '—'; })()"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <template x-if="!profileDetail?.detail?.trashGroups && !profileDetail?.detail?.imported">
          <div class="empty-state" style="padding:24px">
            <div class="desc">Loading profile details...</div>
          </div>
        </template>
      </div>
    </div>
  </div>
{{end}}
